name: Release Windows package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Release tag must be v<semver>: $tag"
          }
          "version=$($tag.Substring(1))" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build release package
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ./scripts/Build-Release.ps1 -Version '${{ steps.version.outputs.version }}'

      - name: Verify extracted release and run E2E
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $archive = Join-Path $PWD "dist\sciposter-windows-amd64-$version.zip"
          $testRoot = Join-Path $env:RUNNER_TEMP "sciposter-release-test-$version"
          New-Item -ItemType Directory -Path $testRoot -Force | Out-Null
          tar.exe -x -f $archive -C $testRoot
          if ($LASTEXITCODE -ne 0) { throw 'Unable to extract the release package.' }
          & "$testRoot\runtime\python\python.exe" "$testRoot\bootstrap\package_manifest.py" validate --root $testRoot
          if ($LASTEXITCODE -ne 0) { throw 'Extracted release manifest validation failed.' }
          & "$testRoot\tests\e2e-local.ps1"

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $archive = "dist\sciposter-windows-amd64-$version.zip"
          $sidecar = "$archive.sha256"
          gh release create $env:GITHUB_REF_NAME $archive $sidecar --verify-tag --generate-notes --title "SciPoster $env:GITHUB_REF_NAME"
